name: Daily Pages Traffic Report

on:
  schedule:
    # 09:00 JST = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Collect traffic and file issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          DATE=$(date -u -d 'yesterday' +%Y-%m-%d)
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)

          views=$(gh api "/repos/$REPO/traffic/views")
          clones=$(gh api "/repos/$REPO/traffic/clones")
          paths=$(gh api "/repos/$REPO/traffic/popular/paths")
          refs=$(gh api "/repos/$REPO/traffic/popular/referrers")
          pages=$(gh api "/repos/$REPO/pages" 2>/dev/null || echo '{}')
          site_url=$(echo "$pages" | jq -r '.html_url // "(unknown)"')

          v_total=$(echo "$views" | jq '.count')
          v_uniq=$(echo "$views" | jq '.uniques')
          c_total=$(echo "$clones" | jq '.count')
          c_uniq=$(echo "$clones" | jq '.uniques')
          y_row=$(echo "$views" | jq --arg d "$DATE" '.views[] | select(.timestamp | startswith($d))')
          y_count=$(echo "$y_row" | jq -r '.count // 0')
          y_uniq=$(echo "$y_row" | jq -r '.uniques // 0')

          {
            echo "# 📊 GitHub Pages Traffic Report — $TODAY (JST)"
            echo
            echo "**Site:** $site_url"
            echo "**Repo:** \`$REPO\`"
            echo "**Source:** GitHub Repository Traffic API (Pages does not expose raw access logs)."
            echo
            echo "## Yesterday ($DATE UTC)"
            echo "- Page views: **$y_count**"
            echo "- Unique visitors: **$y_uniq**"
            echo
            echo "## Trailing 14 days"
            echo "- Total views: **$v_total** (unique: **$v_uniq**)"
            echo "- Total clones: **$c_total** (unique: **$c_uniq**)"
            echo
            echo "## Views per day"
            echo "| Date (UTC) | Views | Uniques |"
            echo "|---|---:|---:|"
            echo "$views" | jq -r '.views[] | "| \(.timestamp[0:10]) | \(.count) | \(.uniques) |"'
            echo
            echo "## Top paths (14d)"
            echo "| Path | Views | Uniques |"
            echo "|---|---:|---:|"
            echo "$paths" | jq -r '.[] | "| `\(.path)` | \(.count) | \(.uniques) |"' | head -20
            echo
            echo "## Top referrers (14d)"
            echo "| Referrer | Views | Uniques |"
            echo "|---|---:|---:|"
            echo "$refs" | jq -r '.[] | "| \(.referrer) | \(.count) | \(.uniques) |"' | head -20
            echo
            echo "---"
            echo "_Generated automatically by \`.github/workflows/pages-traffic-report.yml\`._"
          } > body.md

          gh issue create \
            --repo "$REPO" \
            --title "📊 Pages traffic report – $TODAY" \
            --body-file body.md \
            --label "pages-report" || \
          gh issue create \
            --repo "$REPO" \
            --title "📊 Pages traffic report – $TODAY" \
            --body-file body.md
