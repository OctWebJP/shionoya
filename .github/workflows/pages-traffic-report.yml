name: Daily GitHub Pages Traffic Report

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch traffic data and open issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            const [views, clones, refs, paths, pages] = await Promise.all([
              github.rest.repos.getViews({ owner, repo }),
              github.rest.repos.getClones({ owner, repo }),
              github.rest.repos.getTopReferrers({ owner, repo }),
              github.rest.repos.getTopPaths({ owner, repo }),
              github.rest.repos.getPages({ owner, repo }).catch(() => null),
            ]);

            const today = new Date().toISOString().slice(0, 10);
            const site  = pages?.data?.html_url || `https://${owner.toLowerCase()}.github.io/${repo}/`;

            const table = (rows, cols) =>
              rows.length === 0
                ? '_No data._'
                : [
                    '| ' + cols.map(c => c.h).join(' | ') + ' |',
                    '| ' + cols.map(() => '---').join(' | ') + ' |',
                    ...rows.map(r => '| ' + cols.map(c => String(r[c.k])).join(' | ') + ' |'),
                  ].join('\n');

            const viewRows = views.data.views.slice(-14).map(v => ({
              date: v.timestamp.slice(0, 10),
              count: v.count,
              uniques: v.uniques,
            }));
            const cloneRows = clones.data.clones.slice(-14).map(v => ({
              date: v.timestamp.slice(0, 10),
              count: v.count,
              uniques: v.uniques,
            }));

            const body = [
              `# GitHub Pages Traffic Report — ${today}`,
              ``,
              `**Site:** ${site}`,
              `**Repo:** \`${owner}/${repo}\``,
              ``,
              `> GitHub Pages does not expose raw HTTP access logs. This report uses the repository Traffic API, which is the standard proxy for Pages analytics (14-day rolling window).`,
              ``,
              `## Summary (last 14 days)`,
              `- **Views:** ${views.data.count} total, ${views.data.uniques} unique visitors`,
              `- **Clones:** ${clones.data.count} total, ${clones.data.uniques} unique cloners`,
              ``,
              `## Daily Views`,
              table(viewRows, [
                { h: 'Date', k: 'date' },
                { h: 'Views', k: 'count' },
                { h: 'Uniques', k: 'uniques' },
              ]),
              ``,
              `## Top Referrers`,
              table(refs.data, [
                { h: 'Referrer', k: 'referrer' },
                { h: 'Count', k: 'count' },
                { h: 'Uniques', k: 'uniques' },
              ]),
              ``,
              `## Top Paths`,
              table(paths.data, [
                { h: 'Path', k: 'path' },
                { h: 'Title', k: 'title' },
                { h: 'Views', k: 'count' },
                { h: 'Uniques', k: 'uniques' },
              ]),
              ``,
              `## Daily Clones`,
              table(cloneRows, [
                { h: 'Date', k: 'date' },
                { h: 'Clones', k: 'count' },
                { h: 'Uniques', k: 'uniques' },
              ]),
              ``,
              `_Generated by \`.github/workflows/pages-traffic-report.yml\`._`,
            ].join('\n');

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'pages-traffic' });
            } catch {
              await github.rest.issues.createLabel({
                owner, repo, name: 'pages-traffic', color: '0e8a16',
                description: 'Daily GitHub Pages traffic analysis',
              });
            }

            await github.rest.issues.create({
              owner, repo,
              title: `📊 Pages Traffic Report — ${today}`,
              body,
              labels: ['pages-traffic'],
            });
